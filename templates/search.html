<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>靜宜資管老師查詢</title>
</head>
<body>
    <h1>靜宜資管老師查詢</h1>
    
    <form action="/search" method="post">
        請輸入老師姓名關鍵字：
        <input type="text" name="keyword" value="{{ keyword if keyword else '' }}">
        <button type="submit">查詢</button>
    </form>

    {% if keyword %}
        <hr>
        <h3>查詢結果 (關鍵字：{{ keyword }})：</h3>
        {% if results %}
            {% for teacher in results %}
                <p>
                    <b style="color:blue;">{{ teacher.name }}</b> 
                    老師的研究室是在 {{ teacher.lab }}
                </p>
            {% endfor %}
        {% else %}
            <p>抱歉，查無此關鍵字資料</p>
        {% endif %}
    {% endif %}

    <br>
    <a href="/">返回首頁</a>
</body>
</html>
